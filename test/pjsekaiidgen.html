<!DOCTYPE html>
// chatgpt製なのだ
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロセカプレイヤーid変換ツール</title>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #f0f4f8;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: #ffffff;
      padding: 2em;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 600px;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 1.8em;
      color: #333;
      margin-bottom: 1.5em;
    }

    h2 {
      font-size: 1.2em;
      color: #333;
      margin-bottom: 1em;
    }

    label {
      font-size: 1em;
      color: #555;
      margin-bottom: 0.5em;
      display: block;
    }

    input, button {
      width: 100%;
      padding: 0.8em;
      font-size: 1em;
      margin-bottom: 1.5em;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
    }

    input:focus, button:focus {
      outline: none;
      border-color: #4CAF50;
    }

    button {
      background-color: #4CAF50;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
    }

    p {
      font-size: 1em;
      color: #333;
      word-wrap: break-word;
      margin-top: 0.5em;
    }

    .section {
      margin-bottom: 2em;
    }

    .info-text {
      font-size: 0.9em;
      color: #666;
      margin-top: 0.5em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>プロセカ プレイヤーID 変換ツール</h1>

    <div class="section">
      <h2>初ログイン日時 → プレイヤーID</h2>
      <label for="loginTime">初ログイン日時 (例: 2020-09-16 10:30:45):</label>
      <input type="text" id="loginTime" placeholder="YYYY-MM-DD HH:MM:SS">
      <button onclick="generatePlayerId()">プレイヤーIDを生成</button>
      <p id="generatedId"></p>
      <p class="info-text">※ 年月日と時間は必ず "YYYY-MM-DD HH:MM:SS" 形式で入力してください。</p>
    </div>

    <div class="section">
      <h2>プレイヤーID → 初ログイン日時</h2>
      <label for="playerId">プレイヤーID:</label>
      <input type="text" id="playerId">
      <button onclick="calculateLoginTime()">初ログイン日時を計算</button>
      <p id="calculatedTime"></p>
    </div>
  </div>

  <script>
    const BASE_TIME = new Date('2020-09-16T01:00:00Z'); // JST 10:00 = UTC 1:00
    const MULTIPLIER = 1000 * 1024 * 4096;

    function generatePlayerId() {
      const input = document.getElementById("loginTime").value;
      if (!input) return;
      const dateParts = input.split(" ");
      if (dateParts.length !== 2) {
        document.getElementById("generatedId").textContent = "無効な形式です。";
        return;
      }
      const date = dateParts[0].split("-");
      const time = dateParts[1].split(":");

      if (date.length !== 3 || time.length !== 3) {
        document.getElementById("generatedId").textContent = "無効な形式です。";
        return;
      }

      const year = parseInt(date[0]);
      const month = parseInt(date[1]) - 1;  // 月は0から始まる
      const day = parseInt(date[2]);
      const hour = parseInt(time[0]);
      const minute = parseInt(time[1]);
      const second = parseInt(time[2]);

      const dateObject = new Date(year, month, day, hour, minute, second);
      const seconds = Math.floor((dateObject - BASE_TIME) / 1000);
      const playerId = BigInt(seconds) * BigInt(MULTIPLIER);
      document.getElementById("generatedId").textContent = `プレイヤーID: ${playerId.toString()}`;
    }

    function calculateLoginTime() {
      const idStr = document.getElementById("playerId").value;
      if (!idStr) return;
      try {
        const id = BigInt(idStr);
        const seconds = id / BigInt(MULTIPLIER);
        const loginTime = new Date(BASE_TIME.getTime() + Number(seconds) * 1000);
        document.getElementById("calculatedTime").textContent = `初ログイン日時: ${loginTime.toLocaleString()}`;
      } catch (e) {
        document.getElementById("calculatedTime").textContent = "無効なIDです。";
      }
    }
  </script>
</body>
</html>
